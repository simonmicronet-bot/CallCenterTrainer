        function simulateAgentResponse(userMessage) {
            if (!currentScenario) {
                return currentLanguage === 'en' ? 'I am waiting for your response.' : 'אני מחכה לתשובה שלכם.';
            }
            const lowerMessage = userMessage.toLowerCase();

            if (currentLanguage === 'en') {
                if (
                    lowerMessage.includes('name') ||
                    lowerMessage.includes('what is your name') ||
                    lowerMessage.includes('who am i speaking with')
                ) {
                    return `My name is ${currentScenario.name}`;
                }

                if (lowerMessage.includes('phone') || lowerMessage.includes('number') || lowerMessage.includes('mobile')) {
                    const phoneNumber = generatePhoneNumber();
                    return `My phone number is ${phoneNumber}`;
                }

                if (lowerMessage.includes('id') || lowerMessage.includes('identification') || lowerMessage.includes('identity')) {
                    const idNumber = generateIdNumber();
                    return `My ID number is ${idNumber}`;
                }

                if (lowerMessage.includes('wait') || lowerMessage.includes('hold') || lowerMessage.includes('one moment')) {
                    const holdResponsesEn = [
                        'Okay, thank you.',
                        'Alright, but please hurry.',
                        'Okay, I will wait.',
                        'Fine, just do not leave me waiting too long.'
                    ];
                    return holdResponsesEn[Math.floor(Math.random() * holdResponsesEn.length)];
                }

                if (!currentScenario.customerScenarioIntroductionSent) {
                    currentScenario.customerScenarioIntroductionSent = true;
                    const direction = loadConversationDirection();
                    if (direction === 'outgoing') {
                        return currentScenario.outgoingFirstResponse || currentScenario.initialMessage.replace(/^(?:לקוח(?:ה)?|Customer):\s*/, '');
                    }
                    return currentScenario.initialMessage.replace(/^(?:לקוח(?:ה)?|Customer):\s*/, '');
                }

                if (currentScenario.type === 'sales') {
                    if (lowerMessage.includes('approval') || lowerMessage.includes('recording') || lowerMessage.includes('proof')) {
                        return 'I do not buy that story, send me proper written confirmation.';
                    }
                    if (lowerMessage.includes('cancel') || lowerMessage.includes('refund') || lowerMessage.includes('credit')) {
                        return 'If this is handled properly, maybe I will consider staying.';
                    }
                }
                if (currentScenario.type === 'service') {
                    if (lowerMessage.includes('discount') || lowerMessage.includes('price') || lowerMessage.includes('bill')) {
                        return 'If this is corrected to the promised price, that would solve a lot.';
                    }
                }
                if (currentScenario.type === 'technical') {
                    if (lowerMessage.includes('technician') || lowerMessage.includes('check') || lowerMessage.includes('coverage')) {
                        return 'My phone keeps failing, please handle this now.';
                    }
                }

                let availableEn = currentScenario.responses.filter(r => !currentScenario.usedResponses.includes(r));
                if (availableEn.length === 0) {
                    currentScenario.usedResponses = [];
                    availableEn = currentScenario.responses.slice();
                }
                const responseEn = availableEn[Math.floor(Math.random() * availableEn.length)];
                currentScenario.usedResponses.push(responseEn);
                return responseEn;
            }

            // Reveal name only when the agent explicitly asks for it.
            if (
                lowerMessage.includes('מה השם') ||
                lowerMessage.includes('איך קוראים') ||
                lowerMessage.includes('מה שמך') ||
                lowerMessage.includes('שם הלקוח') ||
                lowerMessage.includes('שם הלקוחה') ||
                lowerMessage.includes('מה שמך המלא')
            ) {
                return `קוראים לי ${currentScenario.name}`;
            }

            // Check for phone number request
            if (lowerMessage.includes('טלפון') || lowerMessage.includes('מספר טלפון') || lowerMessage.includes('פלאפון')) {
                const phoneNumber = generatePhoneNumber();
                return `המספר שלי הוא ${phoneNumber}`;
            }

            // Check for ID number request
            if (lowerMessage.includes('תעודת זהות') || lowerMessage.includes('תעודת הזהות') || lowerMessage.includes('ת.ז') || lowerMessage.includes('מספר זהות') || lowerMessage.includes('תז')) {
                const idNumber = generateIdNumber();
                return `מספר תעודת הזהות שלי הוא ${idNumber}`;
            }

            // Check for hold/wait request
            if (lowerMessage.includes('תמתין') || lowerMessage.includes('תמתיני') || lowerMessage.includes('אנא תמתין') || lowerMessage.includes('אנא תמתיני') || lowerMessage.includes('תמתינו') || lowerMessage.includes('המתן') || lowerMessage.includes('המתיני')) {
                const holdResponses = [
                    'בסדר תודה',
                    'בסדר אבל תזדרז בבקשה',
                    'אוקי אני אמתין',
                    'בסדר רק אל תייבש אותי על הקו'
                ];
                return holdResponses[Math.floor(Math.random() * holdResponses.length)];
            }

            if (!currentScenario.customerScenarioIntroductionSent) {
                currentScenario.customerScenarioIntroductionSent = true;
                const direction = loadConversationDirection();
                if (direction === 'outgoing') {
                    return currentScenario.outgoingFirstResponse || currentScenario.initialMessage.replace(/^לקוח(?:ה)?:\s*/, '');
                }
                return currentScenario.initialMessage.replace(/^לקוח(?:ה)?:\s*/, '');
            }

            if (currentScenario.type === 'sales') {
                if (lowerMessage.includes('אישור') || lowerMessage.includes('מי נתן') || lowerMessage.includes('הקלטה')) {
                    return 'אני לא קונה את הסיפור הזה, תשלחו לי אישור מסודר.';
                }
                if (lowerMessage.includes('ביטול') || lowerMessage.includes('החזר') || lowerMessage.includes('זיכוי')) {
                    return 'אם זה יטופל כראוי, אולי אשקול להישאר.';
                }
            }
            if (currentScenario.type === 'service') {
                if (lowerMessage.includes('הנחה') || lowerMessage.includes('מחיר') || lowerMessage.includes('חשבון')) {
                    return 'אם זה יתוקן במחיר שהובטח, זה יפתור הרבה.';
                }
            }
            if (currentScenario.type === 'technical') {
                if (lowerMessage.includes('טכנאי') || lowerMessage.includes('בדיקה') || lowerMessage.includes('כיסוי')) {
                    return 'הטלפון שלי נופל, תטפלו בזה עכשיו.';
                }
            }
            let available = currentScenario.responses.filter(r => !currentScenario.usedResponses.includes(r));
            if (available.length === 0) {
                currentScenario.usedResponses = [];
                available = currentScenario.responses.slice();
            }
            const response = available[Math.floor(Math.random() * available.length)];
            currentScenario.usedResponses.push(response);
            return response;
        }

            agentFirstNameInput.disabled = true;

            updateVoiceButtonState();
            setAnalysisButtonEnabled(false);
            conversationStartTimestamp = Date.now();
            pendingCustomerMessageTimestamp = null;
            agentResponseDurationsMs = [];
            lastAgentMessageTimestamp = null;
            longestAgentGapMs = 0;
            politenessCount = 0;
            nameAddressCount = 0;
            longPauseCount = 0;
            agentMessageCount = 0;
            customerMessageCount = 0;
            repeatedIssueCount = 0;
            detectedAgentName = '';
            agentFirstMessage = null;
            agentLastMessage = '';
            openingScriptUsed = false;
            closingScriptUsed = false;
            offeredAdditionalHelp = false;
            customerIdentificationRequested = false;
            customerIssueOccurrences = new Map();
            googleTTSSelectedVoices = { male: null, female: null, neutral: null };
            // Clear the chat content
            chat.innerHTML = '';
            conversationHistory = [];
            currentSystemPrompt = '';
            isAwaitingAiResponse = false;
            hideInlineError();

            const type = conversationType.value;
            const selectedDifficulty = difficultyLevel.value;
            if (type === 'sales') currentScenario = generateSalesScenario(selectedDifficulty);
            else if (type === 'service') currentScenario = generateServiceScenario(selectedDifficulty);
            else currentScenario = generateTechnicalScenario(selectedDifficulty);

            // Build system prompt from scenario for AI responses
            currentSystemPrompt = buildSystemPrompt(currentScenario);

            const conversationDirection = loadConversationDirection();
            const typeLabel = getProfessionalTypeLabel(type);
            updateStatus('active', typeLabel, getDifficultyLabel(selectedDifficulty), getConversationModeLabel(currentScenario?.conversationMode?.key));
            if (conversationDirection === 'incoming') {
                currentScenario.customerScenarioIntroductionSent = false;
                addMessage(S('incomingSystemMsg'), 'system');
                startInactivityTimer();
            } else {
                currentScenario.customerScenarioIntroductionSent = false;
                await playOutgoingDialTone(3000);
                if (!conversationStarted) {
                    return;
                }
                const pickupGreeting = getOutgoingPickupGreeting();
                // Seed conversation history with the pickup greeting so AI has context
                conversationHistory.push({ role: 'assistant', content: pickupGreeting });
                addMessage(getCustomerLabel() + ': ' + pickupGreeting, 'agent');
                startInactivityTimer();
            }
        });

        endBtn.addEventListener('click', () => {
            finalizeConversation(currentLanguage === 'en' ? 'Agent' : 'הסוכן', S('disconnectedMsg'));
        });

        function getChatApiUrl() {
            // If the page is opened directly from disk, call local server explicitly.
            return window.location.protocol === 'file:'
                ? 'http://localhost:3000/api/chat'
                : '/api/chat';
        }

        sendBtn.addEventListener('click', () => {
            if (!conversationStarted) return;
            const message = messageInput.value.trim();
            if (!message) return;

            const now = Date.now();

            if (pendingCustomerMessageTimestamp) {
                agentResponseDurationsMs.push(now - pendingCustomerMessageTimestamp);
                pendingCustomerMessageTimestamp = null;
            }

            if (lastAgentMessageTimestamp) {
                const agentGapMs = now - lastAgentMessageTimestamp;
                longestAgentGapMs = Math.max(longestAgentGapMs, agentGapMs);

                const settings = parseMetricSettings();
                if (agentGapMs > settings.targetLongPauseSeconds * 1000) {
                    longPauseCount += 1;
                }
            }

            lastAgentMessageTimestamp = now;
            agentMessageCount += 1;
            politenessCount += countPolitenessExpressions(message);
            if (agentFirstMessage === null) {
                agentFirstMessage = message;
            }
            agentLastMessage = message;
            if (!detectedAgentName) {
                detectedAgentName = extractAgentNameFromMessage(message);
            }
            if (!offeredAdditionalHelp && isAdditionalHelpOfferMessage(message)) {
                offeredAdditionalHelp = true;
            }
            if (!customerIdentificationRequested && isCustomerIdentificationRequestMessage(message)) {
                customerIdentificationRequested = true;
            }
            if (currentScenario?.name) {
                const namePattern = new RegExp(escapeRegExp(currentScenario.name), 'g');
                const nameMatches = message.match(namePattern);
                nameAddressCount += nameMatches ? nameMatches.length : 0;
            }

            addMessage(`${S('youPrefix')}: ` + message, 'user');
            messageInput.value = '';

            // Add agent message to conversation history and get AI customer response
            conversationHistory.push({ role: 'user', content: message });
            isAwaitingAiResponse = true;
            showThinkingIndicator();

            fetch(getChatApiUrl(), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: conversationHistory,
                    systemPrompt: currentSystemPrompt
                })
            })
            .then(r => {
                if (!r.ok) return r.json().then(d => Promise.reject(d.error || 'שגיאת שרת'));
                return r.json();
            })
            .then(data => {
                hideThinkingIndicator();
                isAwaitingAiResponse = false;
                if (!conversationStarted) return;

                const customerReply = data.reply || '';
                conversationHistory.push({ role: 'assistant', content: customerReply });

                const fullText = getCustomerLabel() + ': ' + customerReply;
                addMessage(fullText, 'agent');

                if (data.disconnect) {
                    setTimeout(() => {
                        if (conversationStarted) {
                            finalizeConversationAfterCustomerSpeech(getCustomerLabel(), S('disconnectedMsg'));
                        }
                    }, 1400);
                }
            })
            .catch(err => {
                hideThinkingIndicator();
                isAwaitingAiResponse = false;
                // Roll back the history entry since we didn't get a response
                conversationHistory.pop();
                let errMsg = typeof err === 'string' ? err : 'שגיאת תקשורת עם השרת. ודא שהשרת פעיל ונסה שוב.';
                if (window.location.protocol === 'file:' && typeof err !== 'string') {
                    errMsg = 'העמוד פתוח כקובץ מקומי. הפעל שרת ופתח דרך http://localhost:3000.';
                }
                showInlineError(errMsg);
            });
        });

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendBtn.click();
            }
        });

        voiceBtn.addEventListener('click', () => {
            toggleAgentVoiceInput();
        });

        initializeAgentVoiceInput();
        setAnalysisButtonEnabled(false);
        updateStatus('idle');
    </script>
</body>
</html>
