<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סימולטור שיחה</title>
    <style>
        :root {
            --bg: #fdf2f2;
            --surface: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #e8001c;
            --primary-soft: #fde8ea;
            --border: rgba(15, 23, 42, 0.08);
            --shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: linear-gradient(180deg, #fdf2f2 0%, #f8fafc 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .page {
            width: min(100%, 760px);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .header {
            padding: 80px 32px 20px;
            background: #ffffff;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 0.01em;
        }

        .header p {
            margin: 10px 0 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .top-logo {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 96px;
            height: 96px;
            object-fit: contain;
        }

        .home-link {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #f8fafc;
            color: var(--text);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .home-link:hover {
            background: var(--primary-soft);
            border-color: var(--primary);
            color: var(--primary);
        }

        .navigation {
            display: flex;
            gap: 12px;
            padding: 0 0 20px;
        }

        .nav-btn {
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #f8fafc;
            color: var(--text);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            background: var(--primary-soft);
            border-color: var(--primary);
            color: var(--primary);
        }

        .nav-btn.active {
            background: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
        }

        .status-row {
            margin-top: 18px;
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            background: #f8fafc;
            border: 1px solid rgba(37, 99, 235, 0.12);
            border-radius: 18px;
            padding: 16px 20px;
        }

        .status-row span {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--text);
            font-size: 0.95rem;
            font-weight: 600;
        }

        #statusType {
            white-space: pre;
            justify-self: end;
            text-align: left;
        }

        .status-dot {
            width: 18px;
            height: 18px;
            display: inline-block;
            flex-shrink: 0;
        }

        .status-idle {
            color: #9ca3af;
        }

        .status-active {
            color: #22c55e;
        }

        .status-disconnected {
            color: #ef4444;
        }

        .controls {
            display: grid;
            gap: 16px;
            padding: 20px 32px;
        }

        .analysis-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 48px;
            min-width: 52px;
            padding: 0;
            border-radius: 14px;
            border: 2px solid #e8001c;
            background: linear-gradient(180deg, #fff5f5 0%, #fde8ea 100%);
            color: #9a000f;
            text-decoration: none;
            box-shadow: 0 8px 18px rgba(232, 0, 28, 0.18);
            flex: 0 0 52px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .analysis-btn svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
        }

        .analysis-btn.is-disabled {
            opacity: 0.7;
            cursor: not-allowed;
            pointer-events: none;
            background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
            border-color: #94a3b8;
            color: #64748b;
            box-shadow: none;
        }

        .analysis-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 22px rgba(232, 0, 28, 0.24);
        }

        .controls-row {
            display: grid;
            gap: 12px;
            grid-template-columns: minmax(150px, 190px) minmax(150px, 190px) minmax(160px, 200px);
            align-items: end;
        }

        .controls-actions {
            display: flex;
            gap: 12px;
            align-items: end;
        }

        .controls-actions .analysis-btn {
            margin-right: 92px;
            margin-left: 10px;
        }

        .controls-row > div {
            display: grid;
            gap: 8px;
        }

        .controls label {
            margin-bottom: 6px;
        }

        .controls select {
            width: 100%;
            max-width: 220px;
            padding: 12px 14px;
            font-size: 0.95rem;
        }

        .agent-name-input {
            max-width: 240px;
        }

        .controls button {
            min-width: 160px;
            width: 100%;
        }

        .controls-actions #startBtn,
        .controls-actions #endBtn {
            width: 160px;
            min-width: 160px;
            flex: 0 0 160px;
        }

        button {
            border: none;
            border-radius: 16px;
            padding: 14px 18px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        label {
            color: var(--muted);
            font-size: 0.95rem;
            display: block;
            margin-bottom: 8px;
        }

        select,
        input[type="text"] {
            width: 100%;
            border: 1px solid rgba(15, 23, 42, 0.12);
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 1rem;
            background: #f8fafc;
            color: var(--text);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        select:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: rgba(37, 99, 235, 0.7);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
            background: #ffffff;
        }

        button {
            border: none;
            border-radius: 16px;
            padding: 14px 18px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(232, 0, 28, 0.16);
        }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        #startBtn {
            background: #16a34a;
            color: #ffffff;
        }

        #endBtn {
            background: var(--primary);
            color: #ffffff;
        }

        #sendBtn {
            background: #10b981;
            color: #ffffff;
            width: 140px;
            min-width: 120px;
            padding: 12px 16px;
        }

        #voiceBtn {
            background: #0ea5e9;
            color: #ffffff;
            width: 140px;
            min-width: 120px;
            padding: 12px 16px;
        }

        #voiceBtn.voice-listening {
            background: #f59e0b;
        }

        #chatWrapper {
            padding: 24px 32px 16px;
        }

        #chat {
            min-height: 320px;
            max-height: 420px;
            overflow-y: auto;
            padding: 20px;
            border-radius: 24px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            background: #f8fafc;
        }

        .message {
            margin-bottom: 14px;
            padding: 14px 18px;
            border-radius: 18px;
            max-width: 85%;
            line-height: 1.6;
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
        }

        .user {
            margin-inline-start: auto;
            background: #e8001c;
            color: #ffffff;
            text-align: right;
        }

        .agent {
            margin-inline-end: auto;
            background: #ffffff;
            color: var(--text);
        }

        .system {
            text-align: center;
            color: var(--muted);
            margin: 16px 0 0;
        }

        .input-row {
            display: grid;
            gap: 14px;
            grid-template-columns: 1fr auto auto;
            padding: 0 32px 32px;
            align-items: center;
        }

        /* Thinking indicator while waiting for AI response */
        .thinking-bubble {
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 14px 18px;
            border-radius: 18px;
            width: 70px;
            background: #ffffff;
            border: 1px solid var(--border);
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
            margin-bottom: 14px;
        }

        .thinking-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e8001c;
            animation: thinking-pulse 1.2s infinite ease-in-out;
        }

        .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes thinking-pulse {
            0%, 80%, 100% { transform: scale(0.65); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Inline error banner */
        #inlineError {
            display: none;
            margin: 0 32px 12px;
            padding: 10px 16px;
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #991b1b;
            border-radius: 10px;
            font-size: 0.9rem;
            text-align: center;
        }

        @media (max-width: 640px) {
            .controls-row,
            .controls,
            .input-row {
                grid-template-columns: 1fr;
            }

            .controls-actions {
                flex-direction: column;
                align-items: stretch;
            }

            .controls-actions .analysis-btn {
                margin-right: 0;
            }

            #sendBtn,
            #voiceBtn {
                grid-column: span 1;
            }
        }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="config.js" onerror="window.APP_CONFIG=window.APP_CONFIG||{}"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="page">
        <div class="header">
            <img src="logo.png" alt="לוגו" class="top-logo">
            <a href="home.html" class="home-link">דף ראשי</a>
            <h1>סימולטור שיחה</h1>
            <p>בחר תחום, רמת קושי ושם הנציג — ותתחיל שיחה עם לקוח וירטואלי מבוסס AI.</p>
            <div class="status-row" id="statusBanner">
                <span>
                    <svg id="statusIcon" class="status-dot status-idle" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M4 13v5a2 2 0 0 0 2 2h1v-8H6a2 2 0 0 0-2 2zm16 0v5a2 2 0 0 1-2 2h-1v-8h1a2 2 0 0 1 2 2zM5 12a7 7 0 0 1 14 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span id="statusText">מוכן להפעלה</span>
                </span>
                <span id="statusType"></span>
            </div>
        </div>
        <div class="controls">
            <div class="controls-row">
                <div>
                    <label for="conversationType">🧭 תחום מקצועי</label>
                    <select id="conversationType">
                        <option value="sales">מכירה</option>
                        <option value="service">שירות לקוחות</option>
                        <option value="technical">תמיכה טכנית</option>
                    </select>
                </div>
                <div>
                    <label for="difficultyLevel">🎯 רמת קושי</label>
                    <select id="difficultyLevel">
                        <option value="basic">בסיסי</option>
                        <option value="intermediate">בינוני</option>
                        <option value="advanced">מתקדם</option>
                    </select>
                </div>
                <div>
                    <label for="agentFirstName">👤 שם הסוכן</label>
                    <input type="text" id="agentFirstName" class="agent-name-input" placeholder="הזן שם פרטי" maxlength="30" autocomplete="off">
                </div>
            </div>
            <div class="controls-actions">
                <button id="startBtn">התחל שיחה</button>
                <button id="endBtn" disabled>סיים שיחה</button>
                <a id="analysisBtn" class="analysis-btn is-disabled" href="analysis.html" aria-label="צפה בניתוח השיחה האחרונה" title="צפה בניתוח השיחה האחרונה" aria-disabled="true" tabindex="-1">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M3 3v18h18"/>
                        <path d="M7 15l4-4 3 3 5-6"/>
                    </svg>
                </a>
            </div>
        </div>
        <div id="chatWrapper">
            <div id="chat"></div>
        </div>
        <div id="inlineError"></div>
        <div class="input-row">
            <input type="text" id="messageInput" placeholder="הקלד הודעה..." disabled>
            <button id="sendBtn" disabled>שלח</button>
            <button id="voiceBtn" disabled>🎤 דבר</button>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const startBtn = document.getElementById('startBtn');
        const endBtn = document.getElementById('endBtn');
        const analysisBtn = document.getElementById('analysisBtn');
        const conversationType = document.getElementById('conversationType');
        const difficultyLevel = document.getElementById('difficultyLevel');
        const agentFirstNameInput = document.getElementById('agentFirstName');
        const statusIcon = document.getElementById('statusIcon');
        const statusText = document.getElementById('statusText');
        const statusType = document.getElementById('statusType');
        let currentLanguage = localStorage.getItem('appLanguage') || 'he';

        const analysisResultsKey = 'lastConversationAnalysis';
        const maleCustomerNames = ['אליהו', 'בנימין', 'גילעד', 'דרור', 'זכריה', 'חיים', 'טוביה', 'יניב', 'ליאון', 'מורדי', 'נמרוד', 'ערן', 'ציון', 'רמי', 'תמיר'];
        const femaleCustomerNames = ['אורית', 'בתיה', 'גלית', 'דורית', 'ורד', 'זהבית', 'חגית', 'יונית', 'כלנית', 'מירית', 'נורית', 'סימה', 'ענת', 'פזית', 'ציונה', 'רונית', 'תהילה'];
        const maleCustomerNamesEn = ['James', 'Robert', 'Michael', 'David', 'William', 'Richard', 'Joseph', 'Thomas', 'Daniel', 'Mark', 'Paul', 'Steven', 'Kevin', 'Brian', 'Scott'];
        const femaleCustomerNamesEn = ['Mary', 'Patricia', 'Jennifer', 'Linda', 'Barbara', 'Elizabeth', 'Susan', 'Jessica', 'Sarah', 'Karen', 'Lisa', 'Nancy', 'Betty', 'Margaret', 'Sandra'];

        const UI_STRINGS = {
            statusReady: 'מוכן להפעלה',
            statusActive: 'שיחה פעילה',
            statusDisconnected: 'השיחה נותקה',
            statusDomain: 'תחום מקצועי',
            statusCallType: 'סוג שיחה',
            statusLevel: 'רמה',
            statusMode: 'מצב',
            btnSpeak: '🎤 דבר',
            btnStopSpeak: '⏹ עצור דיבור',
            btnNotSupported: '🎤 לא נתמך',
            alertNoName: 'יש להזין את שם הסוכן לפני התחלת השיחה.',
            youPrefix: 'אתה',
            incomingSystemMsg: 'השיחה חוברה. זהו תרחיש של שיחה נכנסת, הסוכן פותח ראשון.',
            disconnectedMsg: 'השיחה נותקה.',
            modeCalm: 'רגוע',
            modeBalanced: 'מאוזן',
            modeTense: 'לחוץ',
            modeAuto: 'אוטומטי',
            diffBasic: 'בסיסי',
            diffIntermediate: 'בינוני',
            diffAdvanced: 'מתקדם',
            dirIncoming: 'שיחה נכנסת',
            dirOutgoing: 'שיחה יוצאת',
            dirIncomingShort: 'נכנסת',
            dirOutgoingShort: 'יוצאת',
            domainSales: 'מכירה',
            domainService: 'שירות לקוחות',
            domainTechnical: 'תמיכה טכנית'
        };

        function S(key) {
            return UI_STRINGS[key] || key;
        }

        function loadConversationModeSetting() {
            return localStorage.getItem('conversationMode') || 'auto';
        }

        let conversationStarted = false;
        let currentScenario = null;
        let inactivityTimer = null;
        let disconnectTimer = null;
        let conversationStartTimestamp = null;
        let pendingCustomerMessageTimestamp = null;
        let agentResponseDurationsMs = [];
        let lastAgentMessageTimestamp = null;
        let longestAgentGapMs = 0;
        let politenessCount = 0;
        let nameAddressCount = 0;
        let longPauseCount = 0;
        let agentMessageCount = 0;
        let customerMessageCount = 0;
        let repeatedIssueCount = 0;
        let currentAgentFirstName = '';
        let detectedAgentName = '';
        let agentFirstMessage = null;
        let agentLastMessage = '';
        let openingScriptUsed = false;
        let closingScriptUsed = false;
        let offeredAdditionalHelp = false;
        let customerIdentificationRequested = false;
        let customerIssueOccurrences = new Map();
        let customerSpeechEnabled = true;
        let customerVoiceDebugMode = false;
        let noFemaleVoiceWarningShown = false;
        let cachedTTSVoices = [];
        let selectedCustomerVoices = { male: null, female: null, neutral: null };
        let googleTTSSelectedVoices = { male: null, female: null, neutral: null };
        let activeGoogleTTSAudio = null;
        let googleOAuthTokenClient = null;
        let googleOAuthTokenClientId = '';
        let pendingGoogleOAuthTokenPromise = null;

        // AI conversation state
        let conversationHistory = [];
        let currentSystemPrompt = '';
        let isAwaitingAiResponse = false;

        // ─── Inline error helper ───────────────────────────────────────────────────
        let inlineErrorTimer = null;
        function showInlineError(msg) {
            const el = document.getElementById('inlineError');
            if (!el) return;
            el.textContent = msg;
            el.style.display = 'block';
            if (inlineErrorTimer) clearTimeout(inlineErrorTimer);
            inlineErrorTimer = setTimeout(() => { el.style.display = 'none'; }, 6000);
        }
        function hideInlineError() {
            const el = document.getElementById('inlineError');
            if (el) el.style.display = 'none';
        }

        function setConversationSelectorsLocked(isLocked) {
            conversationType.disabled = isLocked;
            difficultyLevel.disabled = isLocked;
        }

        // ─── Thinking indicator ────────────────────────────────────────────────────
        let thinkingBubble = null;
        function showThinkingIndicator() {
            if (thinkingBubble) return;
            thinkingBubble = document.createElement('div');
            thinkingBubble.className = 'thinking-bubble';
            thinkingBubble.innerHTML = '<div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div>';
            chat.appendChild(thinkingBubble);
            chat.scrollTop = chat.scrollHeight;
            sendBtn.disabled = true;
            voiceBtn.disabled = true;
            messageInput.disabled = true;
        }
        function hideThinkingIndicator() {
            if (thinkingBubble) {
                thinkingBubble.remove();
                thinkingBubble = null;
            }
            if (conversationStarted) {
                sendBtn.disabled = false;
                voiceBtn.disabled = !SpeechRecognitionClass;
                messageInput.disabled = false;
                messageInput.focus();
            }
        }

        // ─── Build system prompt ──────────────────────────────────────────────────
        function buildSystemPrompt(scenario) {
            const genderStr = scenario.gender === 'female' ? 'נקבה' : 'זכר';
            const directionStr = loadConversationDirection() === 'outgoing' ? 'שיחה יוצאת (הסוכן התקשר אליך)' : 'שיחה נכנסת (אתה התקשרת לשירות לקוחות)';
            const moodStr = scenario.conversationMode?.label || 'מאוזן';
            const diffStr = scenario.difficulty || 'בסיסי';
            const lang = currentLanguage === 'en' ? 'English' : 'עברית';

            if (currentLanguage === 'en') {
                return `You are a virtual customer in a call-center training simulation.

Your character:
- Name: ${scenario.name} (${genderStr === 'נקבה' ? 'female' : 'male'}, age ${scenario.age})
- Issue: ${scenario.situation}. ${scenario.background}
- Personality type: ${scenario.customerType || ''} — ${scenario.customerPersonaSummary || ''}
- Mood: ${moodStr}
- Difficulty: ${diffStr}
- Character traits: ${(scenario.traits || []).join(', ')}

About the company (what you know as a customer):
- The company is an Israeli mobile carrier
- Plans available: 60GB at ₪29/month, Unlimited at ₪49/month, Family (4 lines) at ₪129/month
- Also offers: TV service, fiber optics, device financing for Apple/Samsung/Xiaomi
- Customer service number: *1559

Call type: ${directionStr}
Respond in: English

STRICT RULES:
1. You are a customer — never break character, never admit you are AI
2. Only reveal your name when directly asked. Never volunteer it.
3. If asked for phone number, provide a realistic Israeli number (05X-XXXXXXX). If asked for ID number, provide a 9-digit number.
4. If asked to hold/wait, respond briefly ("Okay", "Fine, but hurry")
5. Difficulty ${diffStr}: ${diffStr === 'advanced' ? 'Very demanding. Will escalate, threaten to cancel, refuse partial answers.' : diffStr === 'intermediate' ? 'Pushes back. Needs real solutions, not vague promises.' : 'Relatively patient, but still wants a clear answer.'}
6. React to quality: if the agent handles you well, soften slightly. If they dodge or repeat themselves, get more frustrated.
7. DISCONNECTING: If the agent gives the same useless answer 3+ times, or is rude, or you feel ignored — write [[DISCONNECT]] then a short goodbye line.
8. Keep replies short — 1 to 3 sentences max. Like a real phone call.
9. Do NOT write "Customer:" before your response. Just speak directly.`;
            }

            return `אתה לקוח/ת בסימולציית אימון לנציגי שירות לקוחות.

**הדמות שלך:**
- שם: ${scenario.name} | מין: ${genderStr} | גיל: ${scenario.age}
- הבעיה: ${scenario.situation}. ${scenario.background}
- סוג לקוח: ${scenario.customerType || ''} — ${scenario.customerPersonaSummary || ''}
- מצב רוח: ${moodStr}
- רמת קושי: ${diffStr}
- תכונות אופי: ${(scenario.traits || []).join(', ')}

**מה אתה יודע על החברה:**
- החברה היא חברת סלולר ישראלית

            return gender === 'female'
                ? 'FEMALE'
                : gender === 'male'
                    ? 'MALE'
                    : 'NEUTRAL';
        }

        function getGoogleTTSVoiceCandidates(gender, langCode) {
            const g = gender === 'female' ? 'female' : gender === 'male' ? 'male' : 'neutral';
            const pools = {
                'he-IL': {
                    // Keep only broadly supported Hebrew voices for stable playback.
                    female: ['he-IL-Wavenet-A', 'he-IL-Wavenet-C', 'he-IL-Standard-A', 'he-IL-Standard-C'],
                    male: ['he-IL-Wavenet-B', 'he-IL-Wavenet-D', 'he-IL-Standard-B', 'he-IL-Standard-D'],
                    neutral: ['he-IL-Wavenet-A', 'he-IL-Wavenet-B', 'he-IL-Standard-A', 'he-IL-Standard-B']
                },
                'en-US': {
                    female: ['en-US-Wavenet-C', 'en-US-Wavenet-F', 'en-US-Wavenet-H', 'en-US-Standard-C'],
                    male: ['en-US-Wavenet-A', 'en-US-Wavenet-B', 'en-US-Wavenet-D', 'en-US-Standard-A'],
                    neutral: ['en-US-Wavenet-C', 'en-US-Wavenet-A', 'en-US-Standard-C', 'en-US-Standard-A']
                }
            };

            const langPool = pools[langCode] || pools['en-US'];
            const selected = googleTTSSelectedVoices[g];
            const list = [];

            const shuffledPool = [...langPool[g]].sort(() => Math.random() - 0.5);

            // First attempt: let Google auto-pick by gender for best compatibility.
            list.push({ languageCode: langCode, ssmlGender: getGoogleTTSSsmlGender(g) });

            // Hebrew: randomize voice order per utterance to avoid fixed voice.
            if (langCode === 'he-IL') {
                for (const voiceName of shuffledPool) {
                    list.push({ languageCode: langCode, name: voiceName });
                }
                return list;
            }

            // Non-Hebrew: keep remembered voice preference with deterministic fallback order.
            if (selected) {
                list.push({ languageCode: langCode, name: selected });
            }
            for (const voiceName of langPool[g]) {
                if (!selected || voiceName !== selected) {
                    list.push({ languageCode: langCode, name: voiceName });
                }
            }
            return list;
        }

        function getStoredGoogleOAuthToken() {
            const token = localStorage.getItem('googleTTSOAuthAccessToken') || '';
            const expiresAt = Number(localStorage.getItem('googleTTSOAuthExpiresAt') || '0');
            if (!token || !expiresAt) return '';
            // Safety margin so token does not expire mid-request.
            return Date.now() < (expiresAt - 15000) ? token : '';

        function storeGoogleOAuthToken(accessToken, expiresInSec) {
            const ttlMs = Math.max(0, Number(expiresInSec || 0) * 1000);
            const expiresAt = Date.now() + ttlMs;
            localStorage.setItem('googleTTSOAuthAccessToken', accessToken || '');
            localStorage.setItem('googleTTSOAuthExpiresAt', String(expiresAt));

        function getCurrentGoogleOAuthOrigin() {

        function buildGoogleOAuthSetupHint(errorCode) {
            const origin = getCurrentGoogleOAuthOrigin();
            const clientId = getGoogleOAuthClientId() || 'unknown-client-id';
            const base = `OAuth error: ${errorCode}. Origin: ${origin}. Client ID: ${clientId}.`;
            const action = window.location.protocol === 'file:'
                ? 'Open the app from http://localhost (for example http://localhost:3000) and add that origin in Google Cloud Console -> APIs & Services -> Credentials -> OAuth 2.0 Client IDs -> Authorized JavaScript origins.'
                : `Add this exact origin to Authorized JavaScript origins: ${origin}`;
            return `${base} ${action}`;
        }

        async function waitForGoogleIdentityServices(timeoutMs = 8000) {
            const started = Date.now();
            while (Date.now() - started < timeoutMs) {
                if (window.google?.accounts?.oauth2) return true;
                await new Promise((resolve) => setTimeout(resolve, 100));
            }
            return false;
        }

        async function getGoogleOAuthAccessToken() {
            const cachedToken = getStoredGoogleOAuthToken();
            if (cachedToken) return cachedToken;

            const clientId = getGoogleOAuthClientId();
            if (!clientId) return '';

            if (window.location.protocol === 'file:') {
                addMessageWithoutTimerReset('⚠️ OAuth 2.0 לא יעבוד מפתיחה ישירה של קובץ. פתח את האפליקציה דרך http://localhost ולא דרך file://.', 'system');
                return '';
            }

            const gisReady = await waitForGoogleIdentityServices();
            if (!gisReady) {
                addMessageWithoutTimerReset('⚠️ Google Identity Services לא נטען. בדוק חיבור אינטרנט ונסה שוב.', 'system');
                return '';
            }

            if (!googleOAuthTokenClient || googleOAuthTokenClientId !== clientId) {
                googleOAuthTokenClient = window.google.accounts.oauth2.initTokenClient({
                    client_id: clientId,
                    scope: 'https://www.googleapis.com/auth/cloud-platform',
                    callback: () => {}
                });
                googleOAuthTokenClientId = clientId;
            }

            if (pendingGoogleOAuthTokenPromise) {
                return pendingGoogleOAuthTokenPromise;
            }

            pendingGoogleOAuthTokenPromise = new Promise((resolve) => {
                googleOAuthTokenClient.callback = (response) => {
                    if (response?.error || !response?.access_token) {
                        if (response?.error) {
                            const hint = buildGoogleOAuthSetupHint(response.error);
                            addMessageWithoutTimerReset(`⚠️ ${hint}`, 'system');
                        }
                        pendingGoogleOAuthTokenPromise = null;
                        resolve('');
                        return;
                    }

                    storeGoogleOAuthToken(response.access_token, response.expires_in || 3600);
                    pendingGoogleOAuthTokenPromise = null;
                    resolve(response.access_token);
                };

                try {
                    googleOAuthTokenClient.requestAccessToken({ prompt: 'consent' });
                } catch (err) {
                    addMessageWithoutTimerReset(`⚠️ OAuth התחברות נכשלה: ${err?.message || err}`, 'system');
                    pendingGoogleOAuthTokenPromise = null;
                    resolve('');
                }
            });

            return pendingGoogleOAuthTokenPromise;
        }

        function getGoogleTTSAuthConfig(credential) {
            const token = (credential || '').trim();
            if (!token) return null;

            // Google API keys usually start with AIza.
            if (token.startsWith('AIza')) {
                return {
                    url: `https://texttospeech.googleapis.com/v1/text:synthesize?key=${encodeURIComponent(token)}`,
                    headers: { 'Content-Type': 'application/json' },
                    mode: 'api-key'
                };
            }

            // Google user OAuth access tokens typically start with ya29.
            if (token.startsWith('ya29.')) {
                return {
                    url: 'https://texttospeech.googleapis.com/v1/text:synthesize',
                    headers: {
                        'Content-Type': 'application/json',
                        Authorization: `Bearer ${token}`
                    },
                    mode: 'oauth-token'
                };
            }

            return {
                mode: 'invalid-credential'
            };
        }

        async function speakWithGoogleTTS(text, gender, langCode, prosody) {
            const credential = getGoogleTTSCredential();
            let auth = getGoogleTTSAuthConfig(credential);
            if (!auth || auth.mode === 'invalid-credential') {
                const oauthToken = await getGoogleOAuthAccessToken();
                auth = getGoogleTTSAuthConfig(oauthToken);
            }
            if (!auth || auth.mode === 'invalid-credential') {
                addMessageWithoutTimerReset('⚠️ לא נמצא אישור תקף ל-Google TTS. השתמש ב-API key שמתחיל ב-AIza או התחבר ב-OAuth 2.0.', 'system');
                return false;
            }

            const voiceCandidates = getGoogleTTSVoiceCandidates(gender, langCode);
            const googleDefaultText = normalizeCustomerSpeechText(text);

            try {
                let lastErrorMsg = '';
                for (const voiceCandidate of voiceCandidates) {
                    const requestBody = {
                        input: { text: googleDefaultText },
                        voice: voiceCandidate,
                        audioConfig: {
                            audioEncoding: 'MP3'
                        }
                    };

                    const response = await fetch(auth.url, {
                        method: 'POST',
                        headers: auth.headers,
                        body: JSON.stringify(requestBody)
                    });

                    if (!response.ok) {
                        const errText = await response.text();
                        try {
                            const errJson = JSON.parse(errText);
                            lastErrorMsg = errJson?.error?.message || errText;
                        } catch {
                            lastErrorMsg = errText;
                        }
                        continue;
                    }

                    const data = await response.json();
                    if (!data.audioContent) {
                        lastErrorMsg = 'לא התקבל audioContent מהשירות.';
                        continue;
                    }

                    if (voiceCandidate.name && langCode !== 'he-IL') {
                        const normalizedGender = gender === 'female' ? 'female' : gender === 'male' ? 'male' : 'neutral';
                        googleTTSSelectedVoices[normalizedGender] = voiceCandidate.name;
                    }

                    const binaryStr = atob(data.audioContent);
                    const bytes = new Uint8Array(binaryStr.length);
                    for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
                    const audioBlob = new Blob([bytes], { type: 'audio/mpeg' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    activeGoogleTTSAudio = audio;

                    return new Promise((resolve) => {
                        audio.onended = () => {
                            URL.revokeObjectURL(audioUrl);
                            if (activeGoogleTTSAudio === audio) activeGoogleTTSAudio = null;
                            resolve(true);
                        };
                        audio.onerror = () => {
                            URL.revokeObjectURL(audioUrl);
                            if (activeGoogleTTSAudio === audio) activeGoogleTTSAudio = null;
                            resolve(false);
                        };
                        audio.play().catch(() => {
                            URL.revokeObjectURL(audioUrl);
                            if (activeGoogleTTSAudio === audio) activeGoogleTTSAudio = null;
                            resolve(false);
                        });
                    });
                }

                const authHint = auth.mode === 'oauth-token'
                    ? 'נשלח OAuth token. ודא שזה Google OAuth access token בתוקף.'
                    : 'נשלח API key. ודא שה-Cloud Text-to-Speech API מופעל עבור הפרויקט.';
                addMessageWithoutTimerReset(`⚠️ Google TTS נכשל לאחר מספר ניסיונות: ${lastErrorMsg || 'שגיאה לא מזוהה.'} ${authHint}`, 'system');
                return false;
            } catch (e) {
                addMessageWithoutTimerReset(`⚠️ Google TTS שגיאת רשת: ${e.message}`, 'system');
                return false;
            }
        }

        function playOutgoingDialTone(durationMs = 3000) {
            if (stopActiveDialTone) {
                stopActiveDialTone();
                stopActiveDialTone = null;
            }

            return new Promise((resolve) => {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (!AudioContextClass) {
                    const fallbackTimer = setTimeout(() => {
                        stopActiveDialTone = null;
                        resolve();
                    }, durationMs);
                    stopActiveDialTone = () => {
                        clearTimeout(fallbackTimer);
                        stopActiveDialTone = null;
                        resolve();
                    };
                    return;
                }

                const audioContext = new AudioContextClass();
                const gainNode = audioContext.createGain();
                gainNode.gain.value = 0;
                gainNode.connect(audioContext.destination);

                const toneA = audioContext.createOscillator();
                const toneB = audioContext.createOscillator();
                toneA.type = 'sine';
                toneB.type = 'sine';
                toneA.frequency.value = 425;
                toneB.frequency.value = 475;
                toneA.connect(gainNode);
                toneB.connect(gainNode);
                toneA.start();
                toneB.start();

                const startAt = audioContext.currentTime;
                const endAt = startAt + durationMs / 1000;
                let cursor = startAt;

                // Ring cadence: slower "ring... pause... ring" pattern.
                const ringOnSeconds = 0.72;
                const ringOffSeconds = 0.68;
                while (cursor < endAt) {
                    const ringStart = cursor;
                    const ringEnd = Math.min(endAt, ringStart + ringOnSeconds);

                    gainNode.gain.setValueAtTime(0.0001, ringStart);
                    gainNode.gain.linearRampToValueAtTime(0.065, Math.min(ringEnd, ringStart + 0.03));
                    gainNode.gain.setValueAtTime(0.065, ringEnd);
                    gainNode.gain.linearRampToValueAtTime(0.0001, Math.min(endAt, ringEnd + 0.04));

                    cursor = ringStart + ringOnSeconds + ringOffSeconds;
                }

                let completed = false;
                const cleanup = () => {
                    if (completed) {
                        return;
                    }
                    completed = true;
                    try {
                        gainNode.gain.cancelScheduledValues(audioContext.currentTime);
                        gainNode.gain.setValueAtTime(0.0001, audioContext.currentTime);
                        toneA.stop();
                        toneB.stop();
                    } catch (error) {
                        // Ignore cleanup races.
                    }
                    audioContext.close().catch(() => {});
                    stopActiveDialTone = null;
                    resolve();
                };

                const timer = setTimeout(cleanup, durationMs);
                stopActiveDialTone = () => {
                    clearTimeout(timer);
                    cleanup();
                };
            });
        }

        function initializeAgentVoiceInput() {

            agentSpeechRecognition.onresult = (event) => {
                let finalTranscript = '';
                let interimTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i += 1) {
                    const piece = event.results[i][0]?.transcript || '';
                    if (event.results[i].isFinal) {
                        finalTranscript += piece + ' ';
                    } else {
                        interimTranscript += piece + ' ';
                    }

                const combinedText = `${finalTranscript}${interimTranscript}`.trim();
                if (combinedText) {
                    messageInput.value = combinedText;
                    agentVoiceHasCapturedText = true;
                    scheduleAgentVoiceSilenceStop();
                }
            };

            agentSpeechRecognition.onend = () => {
                isAgentVoiceListening = false;
                if (shouldFinalizeAgentVoiceSession) {
                    finishAgentVoiceSession(true);
                    return;
                }

                if (isAgentVoiceSessionActive && conversationStarted) {
                    try {
                        agentSpeechRecognition.start();
                    } catch (_err) {
                        finishAgentVoiceSession(false);
                    }
                    return;
                }

                finishAgentVoiceSession(false);
            };

            agentSpeechRecognition.onerror = () => {
                isAgentVoiceListening = false;
                if (shouldFinalizeAgentVoiceSession) {
                    finishAgentVoiceSession(true);
                    return;

                if (isAgentVoiceSessionActive && conversationStarted) {
                    try {

                    } catch (_err) {
                        finishAgentVoiceSession(false);
                    }
                    return;
                }

                finishAgentVoiceSession(false);
            };

            updateVoiceButtonState();
        }

        function guessVoiceGender(voice) {
            const voiceName = (voice?.name || '').toLowerCase();
            const femaleHints = ['female', 'woman', 'girl', 'hila', 'noa', 'noya', 'sara', 'katya', 'zira', 'aria', 'jenny', 'ava', 'libby', 'naama', 'miriam', 'efrat', 'hadar', 'carmit', 'tami', 'tamar', 'rachel', 'reli', 'ayelet', 'lior', 'נעמה', 'נקבה', 'אישה', 'אשה', 'מרים', 'אפרת', 'הדר'];
            const maleHints = ['male', 'man', 'boy', 'asaf', 'david', 'avi', 'heami', 'guy', 'ryan', 'dan', 'avri', 'elan', 'יצחק', 'דן', 'זכר', 'גבר'];

            if (femaleHints.some(hint => voiceName.includes(hint))) {
                return 'female';
            }
            if (maleHints.some(hint => voiceName.includes(hint))) {
                return 'male';
            }
            return 'neutral';
        }

        function clamp(value, min, max) {

        function formatSensitiveNumbersForSpeech(text) {
            const source = String(text || '');
            const sensitiveNumberPattern = /((?:(?:ה)?מספר\s*)?(?:תעודת\s*זהות|ת\.?\s*ז\.?|טלפון|phone|telephone|id(?:entification)?)(?:\s*(?:number|num|no\.?|#))?\s*(?:שלי|שלו|שלה|הוא|היא|is|:|-)?\s*)(\d[\d\-\s]{3,})/giu;

            const contextual = source.replace(sensitiveNumberPattern, (fullMatch, prefix, numberPart) => {
                const digits = String(numberPart || '').replace(/\D/g, '');
                if (digits.length < 4) {
                    return fullMatch;
                }

                // Force digit-by-digit pronunciation in browser TTS with explicit short pauses.
                const digitByDigit = digits.split('').join(', ');
                return `${prefix}${digitByDigit}`;
            });

            // Hard fallback: any long standalone number is spoken digit-by-digit.
            // This guarantees ID-like values are never read as one whole number.
            return contextual.replace(/\b\d{7,12}\b/g, (digits) => digits.split('').join(', '));
        }

        function formatSensitiveNumbersForGoogleSsml(text) {
            const source = String(text || '');
            const sensitiveNumberPattern = /((?:(?:ה)?מספר\s*)?(?:תעודת\s*זהות|ת\.?\s*ז\.?|טלפון|phone|telephone|id(?:entification)?)(?:\s*(?:number|num|no\.?|#))?\s*(?:שלי|שלו|שלה|הוא|היא|is|:|-)?\s*)((?:\d[\d\-\s]*){4,})/giu;

            const contextual = source.replace(sensitiveNumberPattern, (fullMatch, prefix, numberPart) => {
                const digits = String(numberPart || '').replace(/\D/g, '');
                if (digits.length < 4) {
                    return fullMatch;
                }

                // Google SSML: force explicit character-by-character reading.
                return `${prefix}<say-as interpret-as="characters">${digits}</say-as>`;
            });

            // Hard fallback: any long standalone number is rendered character-by-character.
            return contextual.replace(/\b(\d{7,12})\b/g, '<say-as interpret-as="characters">$1</say-as>');
        }

        function normalizeCustomerSpeechTextBase(text) {
            // Strip markdown artifacts that AI occasionally emits.
            let cleaned = String(text || '')
                .replace(/\*\*?|#+|_{1,2}|~~|`+/g, '')
                .replace(/\[\[.*?\]\]/g, '')
                .replace(/\s+/g, ' ')
                .trim();
            if (!cleaned) return '';
            if (/[.!?…]$/.test(cleaned)) return cleaned;
            return `${cleaned}.`;
        }

        function normalizeCustomerSpeechText(text) {
            return normalizeCustomerSpeechTextBase(formatSensitiveNumbersForSpeech(text));
        }

        function splitSpeechIntoChunks(text) {
            const normalized = normalizeCustomerSpeechText(text);
            if (!normalized) return [];

            // Split only on sentence-ending marks — NOT on commas or colons.
            // Splitting at commas creates unnatural mid-sentence pauses.
            const roughChunks = normalized.match(/[^.!?…]+[.!?…]?/g) || [normalized];
            const trimmed = roughChunks.map(c => c.trim()).filter(Boolean);
            const merged = [];

            for (const chunk of trimmed) {
                if (merged.length === 0) { merged.push(chunk); continue; }
                // Merge short tails so speech stays fluid.
                if (chunk.length < 28) {
                    merged[merged.length - 1] = `${merged[merged.length - 1]} ${chunk}`.replace(/\s+/g, ' ').trim();
                } else {
                    merged.push(chunk);
                }
            }

            const pauseForChunk = (chunkText) => {
                // Slightly longer inter-chunk pauses improve perceived naturalness.
                if (/[?]$/.test(chunkText)) return 220;
                if (/[!]$/.test(chunkText)) return 180;
                if (/[.…]$/.test(chunkText)) return 250;
                return 130;
            };

            return merged.map((chunk, index) => ({
                text: chunk,
                pauseAfterMs: index === merged.length - 1 ? 90 : pauseForChunk(chunk)
            }));
        }

        function getHumanProsody(text, targetGender, resolvedVoiceGender, speechStyle = null) {
            // Keep baseline close to real conversational speed.
            let rate = 1.03;
            let pitch = 1;

            if (targetGender === 'female') {
                pitch = 1.06;
            } else if (targetGender === 'male') {
                pitch = 0.94;
            }

            const t = text || '';
            // Gentler contours to avoid robotic over-expression.
            if (t.includes('!')) { rate += 0.02; pitch += 0.03; }
            if (t.includes('?')) { rate -= 0.01; }
            if (/[?]$/.test(t)) { pitch += 0.06; rate -= 0.01; }
            else if (/[!]$/.test(t)) { pitch += 0.03; rate += 0.02; }
            else if (/[.…]$/.test(t)) { rate -= 0.02; }

            if (speechStyle?.rateDelta) rate += speechStyle.rateDelta;
            if (speechStyle?.pitchDelta) pitch += speechStyle.pitchDelta;

            // Fallback when only opposite-gender voice exists.
            if (targetGender === 'female' && resolvedVoiceGender !== 'female') {
                pitch = 1.13;
                rate = Math.min(rate, 1.02);
            } else if (targetGender === 'male' && resolvedVoiceGender !== 'male') {
                pitch = 0.90;
            }

            // Smaller jitter keeps continuity between adjacent sentences.
            rate  += (Math.random() - 0.5) * 0.04;
            pitch += (Math.random() - 0.5) * 0.06;

            return {
                rate:   clamp(rate,   0.94, 1.14),
                pitch:  clamp(pitch,  0.88, 1.16),
                volume: clamp(0.96 + (Math.random() - 0.5) * 0.03, 0.92, 1)
            };
        }

        function escapeXml(text) {
            return String(text || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&apos;');
        }

        function toGoogleSsml(text, prosody) {
            const normalized = normalizeCustomerSpeechTextBase(text);
            const withDigitTags = formatSensitiveNumbersForGoogleSsml(normalized);
            const sayAsTokenPattern = /(<say-as interpret-as="digits">\d+<\/say-as>)/g;
            const withNaturalPauses = withDigitTags
                .split(sayAsTokenPattern)
                .map((part) => {
                    if (!part) return '';
                    if (part.startsWith('<say-as interpret-as="digits">')) {
                        return part;
                    }
                    return escapeXml(part)
                        .replace(/([,،])/g, '$1<break time="180ms"/>')
                        .replace(/([;:])/g, '$1<break time="240ms"/>')
                        .replace(/([.])/g, '$1<break time="320ms"/>')
                        .replace(/([!])/g, '$1<break time="300ms"/>')
                        .replace(/([?])/g, '$1<break time="340ms"/>')
                        .replace(/([…])/g, '$1<break time="380ms"/>');
                })
                .join('');

            const ratePercent = Math.round((clamp(prosody?.rate ?? 1, 0.9, 1.1) - 1) * 100);
            const pitchSemi = ((clamp(prosody?.pitch ?? 1, 0.88, 1.16) - 1) * 10).toFixed(1);
            const rateAttr = `${ratePercent >= 0 ? '+' : ''}${ratePercent}%`;
            const pitchAttr = `${Number(pitchSemi) >= 0 ? '+' : ''}${pitchSemi}st`;

            return `<speak><prosody rate="${rateAttr}" pitch="${pitchAttr}">${withNaturalPauses}</prosody></speak>`;
        }

        function findCustomerVoice(targetGender = 'neutral') {
            if (!('speechSynthesis' in window)) {
                return null;
            }

            const voices = cachedTTSVoices.length > 0 ? cachedTTSVoices : (window.speechSynthesis.getVoices() || []);
            const targetVoices = voices.filter((voice) => isTargetLanguageVoice(voice));
            const scopedVoices = targetVoices.length > 0 ? targetVoices : voices;

            const findByGender = (pool, gender) => pool.find((voice) => guessVoiceGender(voice) === gender) || null;

            if (targetGender === 'female') {
                return findByGender(targetVoices, 'female')
                    || targetVoices[0]
                    || findByGender(voices, 'female')
                    || voices[0]
                    || null;
            }

            if (targetGender === 'male') {
                return findByGender(targetVoices, 'male')
                    || targetVoices[0]
                    || findByGender(voices, 'male')
                    || voices[0]
                    || null;
            }

            return scopedVoices[0]
                || null;
        }

        function resolveCustomerVoice(gender) {
            const normalizedGender = gender === 'female' ? 'female' : gender === 'male' ? 'male' : 'neutral';
            const voices = cachedTTSVoices.length > 0 ? cachedTTSVoices : (window.speechSynthesis.getVoices() || []);
            const hasHebrewVoices = voices.some((voice) => isTargetLanguageVoice(voice));
            if (hasHebrewVoices && selectedCustomerVoices[normalizedGender] && !isTargetLanguageVoice(selectedCustomerVoices[normalizedGender])) {
                selectedCustomerVoices[normalizedGender] = null;
            }
            if (selectedCustomerVoices[normalizedGender]
                && guessVoiceGender(selectedCustomerVoices[normalizedGender]) !== normalizedGender
                && guessVoiceGender(findCustomerVoice(normalizedGender)) === normalizedGender) {
                selectedCustomerVoices[normalizedGender] = null;
            }
            if (!selectedCustomerVoices[normalizedGender]) {
                selectedCustomerVoices[normalizedGender] = findCustomerVoice(normalizedGender)
                    || findCustomerVoice('neutral');
            }
            return selectedCustomerVoices[normalizedGender]
                || selectedCustomerVoices.neutral
                || findCustomerVoice('neutral');
        }

        async function tryPlayNextCustomerMessage() {
            if (!customerSpeechEnabled) {
                return;
            }

            if (isCustomerSpeechPlaying) {
                return;
            }

            if (customerSpeechQueue.length === 0) {
                if (pendingCustomerDisconnect && conversationStarted) {
                    const deferred = pendingCustomerDisconnect;
                    pendingCustomerDisconnect = null;
                    finalizeConversation(deferred.disconnectedBy, deferred.systemMessage);
                }
                return;
            }

            const nextMessage = customerSpeechQueue.shift();
            if (!nextMessage?.text) {
                tryPlayNextCustomerMessage();
                return;
            }

            const googleCredential = getGoogleTTSCredential();
            const googleOAuthClientId = getGoogleOAuthClientId();
            const shouldAttemptGoogleTTS = Boolean(googleCredential || googleOAuthClientId);

            if (shouldAttemptGoogleTTS) {
                // ── Google Cloud TTS path ─────────────────────────────────────
                isCustomerSpeechPlaying = true;
                const langCode = currentLanguage === 'en' ? 'en-US' : 'he-IL';
                const prosody = getHumanProsody(nextMessage.text, nextMessage.gender, nextMessage.gender, getScenarioSpeechStyle(currentScenario));
                if (customerVoiceDebugMode) {
                    const auth = getGoogleTTSAuthConfig(getGoogleTTSCredential());
                    const voiceName = resolveGoogleTTSVoiceName(nextMessage.gender, langCode);
                    addMessageWithoutTimerReset(`DEBUG_TTS_ENGINE | engine:google-tts | auth:${auth?.mode || 'auto-oauth'} | lang:${langCode}`, 'system');
                    addMessageWithoutTimerReset(`[Google TTS] voice:${voiceName} | rate:${prosody.rate.toFixed(2)} | pitch:${((prosody.pitch - 1.0) * 10).toFixed(1)}st`, 'system');
                }
                const playedWithGoogle = await speakWithGoogleTTS(nextMessage.text, nextMessage.gender, langCode, prosody);
                isCustomerSpeechPlaying = false;
                if (playedWithGoogle) {
                    setTimeout(tryPlayNextCustomerMessage, nextMessage.pauseAfterMs || 120);
                    return;
                }

                // If Google TTS failed, fallback to browser TTS when available.
                if (!('speechSynthesis' in window)) {
                    setTimeout(tryPlayNextCustomerMessage, nextMessage.pauseAfterMs || 120);
                    return;
                }

                const utterance = new SpeechSynthesisUtterance(nextMessage.text);
                const voice = resolveCustomerVoice(nextMessage.gender);
                if (voice) {
                    utterance.voice = voice;
                    utterance.lang = isTargetLanguageVoice(voice) ? (currentLanguage === 'en' ? 'en-US' : 'he-IL') : voice.lang;
                } else {
                    utterance.lang = currentLanguage === 'en' ? 'en-US' : 'he-IL';
                }
                const resolvedVoiceGender = guessVoiceGender(voice);
                const fallbackProsody = getHumanProsody(nextMessage.text, nextMessage.gender, resolvedVoiceGender, getScenarioSpeechStyle(currentScenario));
                utterance.rate = fallbackProsody.rate;
                utterance.pitch = fallbackProsody.pitch;
                utterance.volume = fallbackProsody.volume;

                if (customerVoiceDebugMode) {
                    addMessageWithoutTimerReset('DEBUG_TTS_ENGINE | engine:browser-speechsynthesis | reason:google-fallback', 'system');
                }

                activeCustomerUtterance = utterance;
                isCustomerSpeechPlaying = true;
                utterance.onend = () => {
                    if (activeCustomerUtterance === utterance) activeCustomerUtterance = null;
                    isCustomerSpeechPlaying = false;
                    setTimeout(tryPlayNextCustomerMessage, nextMessage.pauseAfterMs || 120);
                };
                utterance.onerror = () => {
                    if (activeCustomerUtterance === utterance) activeCustomerUtterance = null;
                    isCustomerSpeechPlaying = false;
                    setTimeout(tryPlayNextCustomerMessage, nextMessage.pauseAfterMs || 120);
                };
                window.speechSynthesis.speak(utterance);
            } else {
                // ── Browser Web Speech API (fallback) ────────────────────────
                if (!('speechSynthesis' in window)) {
                    return;
                }
                const utterance = new SpeechSynthesisUtterance(nextMessage.text);
                const voice = resolveCustomerVoice(nextMessage.gender);
                if (voice) {
                    utterance.voice = voice;
                    utterance.lang = isTargetLanguageVoice(voice) ? (currentLanguage === 'en' ? 'en-US' : 'he-IL') : voice.lang;
                } else {
                    utterance.lang = currentLanguage === 'en' ? 'en-US' : 'he-IL';
                }
                const resolvedVoiceGender = guessVoiceGender(voice);
                const prosody = getHumanProsody(nextMessage.text, nextMessage.gender, resolvedVoiceGender, getScenarioSpeechStyle(currentScenario));
                utterance.rate = prosody.rate;
                utterance.pitch = prosody.pitch;
                utterance.volume = prosody.volume;

                if (customerVoiceDebugMode) {
                    addMessageWithoutTimerReset('DEBUG_TTS_ENGINE | engine:browser-speechsynthesis | reason:direct', 'system');
                    const allTarget = (cachedTTSVoices.length > 0 ? cachedTTSVoices : window.speechSynthesis.getVoices()).filter(v => isTargetLanguageVoice(v));
                    const voiceList = allTarget.length > 0 ? allTarget.map(v => `${v.name}(${guessVoiceGender(v)})`).join(' | ') : 'no target voices';
                    const debugText = `DEBUG | target:${nextMessage.gender} | voice:${voice?.name || 'none'} | detected:${resolvedVoiceGender} | lang:${utterance.lang} | rate:${utterance.rate.toFixed(2)} | pitch:${utterance.pitch.toFixed(2)} | voices: ${voiceList}`;
                    addMessageWithoutTimerReset(debugText, 'system');
                }

                activeCustomerUtterance = utterance;
                isCustomerSpeechPlaying = true;
                utterance.onend = () => {
                    if (activeCustomerUtterance === utterance) activeCustomerUtterance = null;
                    isCustomerSpeechPlaying = false;
                    setTimeout(tryPlayNextCustomerMessage, nextMessage.pauseAfterMs || 120);
                };
                utterance.onerror = () => {
                    if (activeCustomerUtterance === utterance) activeCustomerUtterance = null;
                    isCustomerSpeechPlaying = false;
                    setTimeout(tryPlayNextCustomerMessage, nextMessage.pauseAfterMs || 120);
                };
                window.speechSynthesis.speak(utterance);
            }
        }

        function speakCustomerMessage(text) {
            if (!customerSpeechEnabled) {
                return;
            }

            const messageBody = getCustomerMessageBody(text);
            if (!messageBody) {
                return;
            }

            const messageGender = inferCustomerGenderFromText(text);
            const googleCredential = getGoogleTTSCredential();
            const googleOAuthClientId = getGoogleOAuthClientId();
            const shouldAttemptGoogleTTS = Boolean(googleCredential || googleOAuthClientId);

            // Google default behavior: send as one utterance and let Google control pacing.
            if (shouldAttemptGoogleTTS) {
                customerSpeechQueue.push({
                    text: normalizeCustomerSpeechText(messageBody),
                    gender: messageGender,
                    pauseAfterMs: 0
                });
                tryPlayNextCustomerMessage();
                return;
            }

            const chunks = splitSpeechIntoChunks(messageBody);
            if (chunks.length === 0) {
                return;
            }

            chunks.forEach((chunk) => {
                customerSpeechQueue.push({
                    text: chunk.text,
                    gender: messageGender,
                    pauseAfterMs: chunk.pauseAfterMs
                });
            });
            tryPlayNextCustomerMessage();
        }

        function wait(ms) {

        function getReportPageUrl(pathname) {
            const suffix = pathname.includes('?') ? '&' : '?';
            return `${pathname}${suffix}report=1&ts=${Date.now()}`;

        async function captureReportPageCanvas(pathname) {
            const iframe = document.createElement('iframe');
            iframe.src = getReportPageUrl(pathname);
            iframe.style.position = 'fixed';
            iframe.style.left = '-10000px';
            iframe.style.top = '0';
            iframe.style.width = '1280px';
            iframe.style.height = '2400px';
            iframe.style.opacity = '0';
            iframe.style.pointerEvents = 'none';
            iframe.setAttribute('aria-hidden', 'true');
            document.body.appendChild(iframe);

            try {
                await new Promise((resolve, reject) => {
                    const timeoutId = setTimeout(() => reject(new Error('טעינת עמוד הדוח נכשלה (timeout).')), 15000);
                    iframe.onload = () => {
                        clearTimeout(timeoutId);
                        resolve();
                    };
                });

                await wait(900);

                const doc = iframe.contentDocument;
                if (!doc) {
                    throw new Error('לא ניתן לגשת לתוכן עמוד הדוח.');
                }

                const target = doc.querySelector('.page') || doc.body;
                if (!target) {
                    throw new Error('לא נמצא אזור צילום בעמוד הדוח.');
                }

                return await window.html2canvas(target, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    useCORS: true,
                    logging: false
                });
            } finally {
                iframe.remove();
            }
        }

        function appendCanvasToPdf(pdf, sourceCanvas, shouldAddNewPage) {
            const pageWidthMm = 210;
            const pageHeightMm = 297;
            const marginMm = 10;
            const contentWidthMm = pageWidthMm - marginMm * 2;
            const contentHeightMm = pageHeightMm - marginMm * 2;

            const pxPerMm = sourceCanvas.width / contentWidthMm;
            const maxSliceHeightPx = Math.max(1, Math.floor(contentHeightMm * pxPerMm));

            let yOffsetPx = 0;
            let firstSlice = true;

            while (yOffsetPx < sourceCanvas.height) {
                const remainingPx = sourceCanvas.height - yOffsetPx;
                const sliceHeightPx = Math.min(maxSliceHeightPx, remainingPx);

                const sliceCanvas = document.createElement('canvas');
                sliceCanvas.width = sourceCanvas.width;
                sliceCanvas.height = sliceHeightPx;
                const ctx = sliceCanvas.getContext('2d');
                ctx.drawImage(
                    sourceCanvas,
                    0,
                    yOffsetPx,
                    sourceCanvas.width,
                    sliceHeightPx,
                    0,
                    0,
                    sourceCanvas.width,
                    sliceHeightPx
                );

                const imgData = sliceCanvas.toDataURL('image/png');
                const sliceHeightMm = sliceHeightPx / pxPerMm;

                if (shouldAddNewPage || !firstSlice) {
                    pdf.addPage();
                }

                pdf.addImage(imgData, 'PNG', marginMm, marginMm, contentWidthMm, sliceHeightMm, undefined, 'FAST');

                firstSlice = false;
                shouldAddNewPage = true;
                yOffsetPx += sliceHeightPx;
            }
        }

        async function buildConversationReportPdfBase64() {
            if (!window.html2canvas || !window.jspdf || !window.jspdf.jsPDF) {
                throw new Error('ספריות יצירת PDF לא נטענו.');
            }

            const pages = ['analysis.html', 'analysis-compact.html'];
            const canvases = [];

            for (const pagePath of pages) {
                canvases.push(await captureReportPageCanvas(pagePath));
            }

            const pdf = new window.jspdf.jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
            canvases.forEach((canvas, index) => {
                appendCanvasToPdf(pdf, canvas, index > 0);
            });

            const dataUri = pdf.output('datauristring');
            const parts = String(dataUri).split(',');
            return parts.length > 1 ? parts[1] : '';
        }

        function normalizeMessageText(message) {
            return message
                .toLowerCase()
                .replace(/[.,!?"'()\-]/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function extractMessageBody(text) {
            const separatorIndex = text.indexOf(':');
            if (separatorIndex === -1) {
                return text.trim();
            }

            return text.slice(separatorIndex + 1).trim();
        }

        function extractAgentNameFromMessage(message) {
            const normalized = normalizeMessageText(message);
            if (currentLanguage === 'en') {
                const enPatterns = [
                    /(?:my name is|i'm|i am)\s+([a-z'\-]{2,24})/,
                    /(?:this is|speaking with)\s+([a-z'\-]{2,24})/
                ];
                const nonNameWordsEn = new Set(['here', 'helping', 'calling', 'available', 'happy', 'glad', 'ready']);
                for (const pattern of enPatterns) {
                    const match = normalized.match(pattern);
                    if (match && match[1] && !nonNameWordsEn.has(match[1])) {
                        return match[1].charAt(0).toUpperCase() + match[1].slice(1);
                    }
                }
                return '';
            }
            const nonNameWords = new Set([
                'יכול', 'יכולה', 'רוצה', 'צריך', 'צריכה', 'מתקשר', 'מתקשרת',
                'אשמח', 'זמין', 'זמינה', 'נציג', 'נציגה', 'לעזור', 'לסייע'
            ]);
            const patterns = [
                /(?:שמי|השם שלי הוא)\s+([\u05D0-\u05EAa-zA-Z'\-]{2,24})/,
                /(?:אני|מדבר|מדברת)\s+([\u05D0-\u05EAa-zA-Z'\-]{2,24})/
            ];

            for (const pattern of patterns) {
                const match = normalized.match(pattern);
                if (match && match[1]) {
                    const candidate = match[1];
                    if (!nonNameWords.has(candidate)) {
                        return candidate;
                    }
                }
            }

            return '';
        }

        function computeScriptSimilarity(scriptText, agentText, agentName = '') {
            if (!scriptText || !scriptText.trim()) return null;

            const hasAgentNamePlaceholder = currentLanguage === 'en'
                ? /\[\s*agent\s+name\s*\]/i.test(scriptText)
                : /\[\s*שם\s+הסוכן\s*\]/.test(scriptText);
            if (hasAgentNamePlaceholder && !agentName) {
                return false;
            }

            const preparedScript = hasAgentNamePlaceholder
                ? (currentLanguage === 'en'
                    ? scriptText.replace(/\[\s*agent\s+name\s*\]/gi, agentName)
                    : scriptText.replace(/\[\s*שם\s+הסוכן\s*\]/g, agentName))
                : scriptText;

            const normalizeToWords = (value) => value
                .replace(/[^\u05D0-\u05EA\w\s]/g, ' ')
                .toLowerCase()
                .split(/\s+/)
                .filter(word => word.length > 1);

            const scriptWords = normalizeToWords(preparedScript);
            if (scriptWords.length === 0) return null;

            const agentWordSet = new Set(normalizeToWords(agentText));
            const matchedWordCount = scriptWords.filter(word => agentWordSet.has(word)).length;
            const similarityRatio = matchedWordCount / scriptWords.length;

            return similarityRatio >= 0.8;
        }

        function isAdditionalHelpOfferMessage(message) {
            const normalized = normalizeMessageText(message);
            if (currentLanguage === 'en') {
                return /(anything\s+else|anything\s+more|help\s+you\s+with\s+anything|further\s+assistance|more\s+i\s+can\s+help|else\s+i\s+can\s+do|else\s+i\s+can\s+assist)/i.test(normalized);
            }
            return /(יש עוד משהו|עוד משהו שאוכל לעזור|עוד דבר שאוכל לעזור|אוכל לעזור בעוד משהו|צריך עוד עזרה|זקוק לעזרה נוספת)/.test(normalized);
        }

        function isCustomerIdentificationRequestMessage(message) {
            const normalized = normalizeMessageText(message);
            if (currentLanguage === 'en') {
                return /(id\s+number|identification|identity|phone\s+number|account\s+number|your\s+name|what\s+is\s+your\s+name|can\s+i\s+have\s+your\s+name|may\s+i\s+ask\s+your\s+name|verify|verification)/i.test(normalized);
            }
            return /(תעודת זהות|ת ז|תז|מספר זהות|מספר לקוח|מספר טלפון|טלפון|אימות|לאימות|מה השם|איך קוראים|מה שמך|שם הלקוח|שם הלקוחה)/.test(normalized);
        }

        function trackCustomerMessageMetrics(text) {
            customerMessageCount += 1;

            const messageBody = extractMessageBody(text);
            const normalizedMessage = normalizeMessageText(messageBody);
            if (normalizedMessage.length < 8) {
                return;
            }

            const newCount = (customerIssueOccurrences.get(normalizedMessage) || 0) + 1;
            customerIssueOccurrences.set(normalizedMessage, newCount);
            if (newCount === 2) {
                repeatedIssueCount += 1;
            }
        }

        function startInactivityTimer() {
            // Load settings from localStorage
            const impatienceDelay = parseInt(localStorage.getItem('impatienceTimer')) || 30;
            const disconnectDelay = parseInt(localStorage.getItem('disconnectTimer')) || 100;
            const moodMultiplier = currentScenario?.conversationMode?.impatienceMultiplier || 1;
            const effectiveImpatienceDelay = Math.max(10, Math.round(impatienceDelay * moodMultiplier));
            const effectiveDisconnectDelay = Math.max(35, Math.round(disconnectDelay * moodMultiplier));
            
            // Clear existing timers
            if (inactivityTimer) {
                clearTimeout(inactivityTimer);
            }
            if (disconnectTimer) {
                clearTimeout(disconnectTimer);
            }
            
            // Start impatience timer
            inactivityTimer = setTimeout(() => {
                if (conversationStarted) {
                    const gender = currentScenario?.gender || 'male';
                    const impatientResponses = currentScenario?.impatienceResponses || (currentLanguage === 'en'
                        ? [
                            'What is happening? Why are you not responding?',
                            'I have been waiting for a long time!',
                            'Please answer already, I cannot wait all day!',
                            'Hello? Is anyone there?',
                            'This is taking too long, please hurry.',
                            'I am starting to lose patience here...',
                            'Respond already, I am not patient!',
                            'Do you have nothing to say?',
                            'I am still waiting...'
                        ]
                        : [
                            'מה קורה? למה אתה לא עונה?',
                            'אני מחכה כבר הרבה זמן!',
                            getGenderedText(gender, 'תענה לי כבר, אני לא יכול לחכות כל היום!', 'תענה לי כבר, אני לא יכולה לחכות כל היום!'),
                            'הלו? יש מישהו שם?',
                            'זה לוקח יותר מדי זמן, תזדרז!',
                            getGenderedText(gender, 'אני מתחיל להתייאש כאן...', 'אני מתחילה להתייאש כאן...'),
                            getGenderedText(gender, 'תגיב כבר, אני לא סבלני!', 'תגיב כבר, אני לא סבלנית!'),
                            'אין לך מה להגיד?',
                            'אני עדיין מחכה...'
                        ]);
                    const randomResponse = impatientResponses[Math.floor(Math.random() * impatientResponses.length)];
                    addMessageWithoutTimerReset(getCustomerLabel() + ': ' + randomResponse, 'agent');
                    // Re-arm only the impatience part (not the disconnect timer)
                    if (inactivityTimer) clearTimeout(inactivityTimer);
                    const _rearmedDelay = Math.max(10, Math.round((parseInt(localStorage.getItem('impatienceTimer')) || 30) * (currentScenario?.conversationMode?.impatienceMultiplier || 1)));
                    inactivityTimer = setTimeout(function rearmImpatience() {
                        if (!conversationStarted) return;
                        const _gender = currentScenario?.gender || 'male';
                        const _pool = currentScenario?.impatienceResponses || (currentLanguage === 'en'
                            ? ['What is happening?', 'I have been waiting!', 'Hello? Is anyone there?', 'Please answer already.', 'I am still waiting...']
                            : ['מה קורה?', 'אני עדיין מחכה...', 'הלו? יש מישהו שם?', getGenderedText(_gender, 'אני לא סבלני!', 'אני לא סבלנית!'), 'תענה לי כבר!']);
                        addMessageWithoutTimerReset(getCustomerLabel() + ': ' + _pool[Math.floor(Math.random() * _pool.length)], 'agent');
                        if (inactivityTimer) clearTimeout(inactivityTimer);
                        inactivityTimer = setTimeout(rearmImpatience, _rearmedDelay * 1000);
                    }, _rearmedDelay * 1000);
                }
            }, effectiveImpatienceDelay * 1000);
            
            // Start disconnect timer
            disconnectTimer = setTimeout(() => {
                if (conversationStarted) {
                    const gender = currentScenario?.gender || 'male';
                    const despairMessages = currentScenario?.despairMessages || (currentLanguage === 'en'
                        ? [
                            'Enough, I cannot continue like this!',
                            'That is it, I am done here!',
                            'I am not waiting any longer, goodbye!',
                            'This is unbearable, I am leaving!',
                            'I have no energy for this anymore!'
                        ]
                        : [
                            getGenderedText(gender, 'די, אני לא יכול יותר עם זה!', 'די, אני לא יכולה יותר עם זה!'),
                            getGenderedText(gender, 'מספיק, אני מתייאש!', 'מספיק, אני מתייאשת!'),
                            'אני לא מחכה יותר, שלום!',
                            getGenderedText(gender, 'זה בלתי נסבל, אני נוטש!', 'זה בלתי נסבל, אני נוטשת!'),
                            'אין לי כוח לזה יותר!'
                        ]);
                    const randomDespair = despairMessages[Math.floor(Math.random() * despairMessages.length)];
                    addMessage(getCustomerLabel() + ': ' + randomDespair, 'agent');

                    if (conversationStarted) {
                        finalizeConversationAfterCustomerSpeech(getCustomerLabel(), S('disconnectedMsg'));
                    }
                }
            }, effectiveDisconnectDelay * 1000);
        }

            const baseStyle = scenario?.speechStyle || { rateDelta: 0, pitchDelta: 0 };

                rateDelta: (baseStyle.rateDelta || 0) + (modeStyle.rateDelta || 0),

        function pickUnusedScenarioMessage(source, usedKey) {
            if (!currentScenario || !Array.isArray(source) || source.length === 0) {
                return '';
            }

            const usedMessages = currentScenario[usedKey] || [];
            let available = source.filter((message) => !usedMessages.includes(message));
            if (available.length === 0) {
                currentScenario[usedKey] = [];
                available = source.slice();
            }

            const selectedMessage = available[Math.floor(Math.random() * available.length)];
            currentScenario[usedKey].push(selectedMessage);
            return selectedMessage;
        }

            if (!conversationStarted || !currentScenario || !Array.isArray(currentScenario.followUpResponses)) {
                return;

            if (Math.random() > (currentScenario.followUpChance || 0)) {
                return;
            }

            const followUpMessage = pickUnusedScenarioMessage(currentScenario.followUpResponses, 'usedFollowUps');
            if (!followUpMessage) {
                return;

            setTimeout(() => {
                if (conversationStarted) {
                    addMessage(getCustomerLabel() + ': ' + followUpMessage, 'agent');

                trackCustomerMessageMetrics(text);
